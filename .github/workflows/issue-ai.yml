name: Issue AI Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
    - uses: alexyan0431/issue-ai-agent@v1
      with:
        openai-api-key: ${{ secrets.LLM_API_KEY }}
        llm-provider: anthropic
        llm-base-url: https://open.bigmodel.cn/api/anthropic
