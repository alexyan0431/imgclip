name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux clipboard deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb1 libx11-6 libwayland-client0
      - run: cargo test
      - run: cargo build --release
